[pytest]
# Configuration for the fill command.

# The pytest plugin restricts collection to the filler tests.
testpaths = tests

addopts =
    -p ssz_testing.plugin
    # Show shorter tracebacks
    --tb=short
    # Disable coverage for fixture generation
    --no-cov

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimal output for filling
console_output_style = classic
